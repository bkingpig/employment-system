{% extends "index.html" %}

{% block content %}
<h2>修改就业信息</h2>
<form method="post">
    学号：<input type="text" name="student_id" value="{{ record.student_id }}" readonly disabled><br>
    姓名：<input type="text" name="name" value="{{ record.name }}" required><br>
    专业：<input type="text" name="major" value="{{ record.major }}"><br>
    性别：<input type="text" name="gender" value="{{ record.gender }}"><br>
    电话：<input type="text" name="phone" value="{{ record.phone }}"><br>
    就业单位：<input type="text" name="employer" value="{{ record.employer }}" required><br>
    状态：<input type="text" name="status" value="{{ record.status }}"><br>
    <button type="submit">保存修改</button>
    <a href="{{ url_for('dashboard') }}">返回</a>
</form>
{% endblock %}
